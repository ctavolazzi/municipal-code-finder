<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Municipal Code Finder — Property Owner's Edge</title>
<style>
:root {
  --cream: #f5f0e6;
  --cream-dark: #ede6d8;
  --paper: #faf8f3;
  --chocolate: #4a2c2a;
  --choc-mid: #6b4423;
  --burnt-orange: #e07b3c;
  --rust: #c2410c;
  --teal: #0d9488;
  --gold: #d97706;
  --line: #d4c4a8;
  --muted: #7a6b5d;
  --ink: #3a312b;
  --green: #2d6a4f;
  --blue: #1e4d7b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: var(--chocolate);
  color: var(--cream);
  padding: 1.5rem 2rem;
  border-bottom: 3px solid var(--burnt-orange);
}
header h1 {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 0.15rem;
}
header p {
  font-size: 0.9rem;
  opacity: 0.7;
}

/* ── Controls ── */
.controls {
  background: var(--cream-dark);
  border-bottom: 2px solid var(--line);
  padding: 1rem 2rem;
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 10;
}
.search-wrap {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  padding: 0.5rem 0.75rem 0.5rem 2rem;
  border: 2px solid var(--line);
  background: var(--paper);
  color: var(--ink);
  font-size: 0.9rem;
  outline: none;
}
.search-wrap input:focus { border-color: var(--burnt-orange); }
.search-icon {
  position: absolute;
  left: 0.5rem;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.4;
  font-size: 0.9rem;
  pointer-events: none;
}
select {
  padding: 0.5rem 0.75rem;
  border: 2px solid var(--line);
  background: var(--paper);
  color: var(--ink);
  font-size: 0.9rem;
  cursor: pointer;
  outline: none;
}
select:focus { border-color: var(--burnt-orange); }
.count-label {
  font-size: 0.85rem;
  color: var(--muted);
  white-space: nowrap;
  margin-left: auto;
}
.count-label strong { color: var(--burnt-orange); }

/* ── Grid ── */
.grid {
  max-width: 1100px;
  margin: 0 auto;
  padding: 1.5rem 1.5rem 4rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1.25rem;
}

/* ── Card ── */
.card {
  background: var(--paper);
  border: 2px solid var(--chocolate);
  box-shadow: 4px 4px 0 var(--chocolate);
  display: flex;
  flex-direction: column;
  transition: box-shadow 0.1s, transform 0.1s;
}
.card:hover {
  box-shadow: 6px 6px 0 var(--burnt-orange);
  transform: translate(-1px, -1px);
}
.card-top {
  padding: 0.9rem 1rem 0.7rem;
  border-bottom: 1.5px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 0.5rem;
}
.jurisdiction {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 0.15rem 0.45rem;
  border: 1.5px solid currentColor;
}
.jurisdiction.state  { color: var(--blue); }
.jurisdiction.county { color: var(--green); }
.jurisdiction.city   { color: var(--choc-mid); }
.jurisdiction.federal{ color: var(--rust); }
.stars { color: var(--gold); font-size: 0.95rem; white-space: nowrap; }

.card-body { padding: 0.85rem 1rem; flex: 1; }
.code-ref {
  font-size: 0.8rem;
  font-family: monospace;
  color: var(--muted);
  margin-bottom: 0.3rem;
}
.card-title {
  font-weight: 700;
  font-size: 1rem;
  color: var(--chocolate);
  margin-bottom: 0.35rem;
  line-height: 1.3;
}
.cat-tag {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0.1rem 0.4rem;
  margin-bottom: 0.6rem;
  border-radius: 2px;
}
.cat-owner-builder  { background: #fef3c7; color: #92400e; }
.cat-adu            { background: #d1fae5; color: #065f46; }
.cat-permit-exempt  { background: #e0f2fe; color: #075985; }
.cat-ag-rights      { background: #f0fdf4; color: #166534; }
.cat-grandfathering { background: #f5f3ff; color: #5b21b6; }
.cat-off-grid       { background: #fff7ed; color: #c2410c; }
.cat-variance       { background: #fdf2f8; color: #9d174d; }
.cat-tax-homestead  { background: #f0f9ff; color: #0c4a6e; }
.cat-right-to-farm  { background: #f7fee7; color: #3f6212; }
.cat-water-rights   { background: #ecfeff; color: #164e63; }

.description {
  font-size: 0.9rem;
  color: var(--ink);
  margin-bottom: 0.5rem;
}
.conditions {
  font-size: 0.82rem;
  color: var(--muted);
  border-left: 2.5px solid var(--line);
  padding-left: 0.6rem;
  margin-bottom: 0.5rem;
}
.conditions strong { color: var(--rust); font-size: 0.78rem; display: block; margin-bottom: 0.1rem; }

.card-foot {
  padding: 0.6rem 1rem;
  border-top: 1.5px solid var(--line);
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  align-items: center;
}
.tag-pill {
  font-size: 0.7rem;
  padding: 0.1rem 0.4rem;
  background: var(--cream-dark);
  color: var(--muted);
  border: 1px solid var(--line);
  cursor: pointer;
}
.tag-pill:hover { background: var(--line); color: var(--ink); }
.source-link {
  margin-left: auto;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--burnt-orange);
  text-decoration: none;
  border-bottom: 1.5px solid transparent;
  white-space: nowrap;
}
.source-link:hover { border-color: var(--burnt-orange); }

/* ── Empty state ── */
.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 4rem 2rem;
  color: var(--muted);
}
.empty h2 { font-size: 1.25rem; margin-bottom: 0.5rem; color: var(--chocolate); }

/* ── Submit banner ── */
.submit-banner {
  background: var(--chocolate);
  color: var(--cream);
  text-align: center;
  padding: 0.7rem;
  font-size: 0.85rem;
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  border-top: 2px solid var(--burnt-orange);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
}
.submit-banner a {
  color: var(--burnt-orange);
  font-weight: 700;
  text-decoration: none;
}
</style>
</head>
<body>

<header>
  <h1>Municipal Code Finder</h1>
  <p>Legal provisions that give property owners more rights, fewer restrictions, and more control over their land.</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="search" placeholder="Search codes, descriptions, tags..." oninput="render()">
  </div>
  <select id="stateFilter" onchange="render()">
    <option value="">All States</option>
  </select>
  <select id="catFilter" onchange="render()">
    <option value="">All Categories</option>
  </select>
  <select id="sortBy" onchange="render()">
    <option value="usefulness">Sort: Most Useful</option>
    <option value="alpha">Sort: A–Z</option>
    <option value="state">Sort: State</option>
  </select>
  <div class="count-label"><strong id="countNum">0</strong> codes</div>
</div>

<div class="grid" id="grid"></div>

<div class="submit-banner">
  Know a code that should be here?
  <a href="javascript:void(0)" onclick="addCodePrompt()">+ Add it</a>
  &nbsp;|&nbsp;
  Data saved locally in your browser.
  <a href="javascript:void(0)" onclick="exportData()">Export JSON</a>
</div>

// ── State & Filtering ─────────────────────────────────────────────────────────
let userCodes = JSON.parse(localStorage.getItem('municipalUserCodes') || '[]');
function allCodes() { return [...BUILTIN, ...userCodes]; }

function buildFilters() {
  const states = [...new Set(allCodes().map(c => c.state))].sort();
  const cats   = [...new Set(allCodes().map(c => c.category))].sort();
  const sf = document.getElementById('stateFilter');
  const cf = document.getElementById('catFilter');
  states.forEach(s => { const o = document.createElement('option'); o.value = s; o.text = s; sf.appendChild(o); });
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.text = catLabel(c); cf.appendChild(o); });
}

function catLabel(cat) {
  const map = {
    'owner-builder':  'Owner-Builder',
    'adu':            'ADU / JADU',
    'permit-exempt':  'Permit Exemption',
    'ag-rights':      'Agricultural Rights',
    'grandfathering': 'Grandfathering',
    'off-grid':       'Off-Grid Systems',
    'variance':       'Variance / HOA Limits',
    'tax-homestead':  'Tax & Homestead',
    'right-to-farm':  'Right to Farm',
    'water-rights':   'Water Rights',
  };
  return map[cat] || cat;
}

function catClass(cat) { return 'cat-' + cat; }

function stars(n) { return '★'.repeat(n) + '☆'.repeat(5 - n); }

function levelLabel(lvl) {
  return { state:'State', county:'County', city:'City', federal:'Federal' }[lvl] || lvl;
}

function filter(codes) {
  const q    = document.getElementById('search').value.toLowerCase();
  const st   = document.getElementById('stateFilter').value;
  const cat  = document.getElementById('catFilter').value;
  const sort = document.getElementById('sortBy').value;

  let out = codes.filter(c => {
    if (st  && c.state !== st)    return false;
    if (cat && c.category !== cat) return false;
    if (q) {
      const blob = [c.title, c.description, c.reference, c.state, c.conditions, ...(c.tags||[])].join(' ').toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });

  if (sort === 'usefulness') out.sort((a,b) => b.usefulness - a.usefulness);
  else if (sort === 'alpha') out.sort((a,b) => a.title.localeCompare(b.title));
  else if (sort === 'state') out.sort((a,b) => a.state.localeCompare(b.state) || b.usefulness - a.usefulness);

  return out;
}

function addTagSearch(tag) {
  document.getElementById('search').value = tag;
  render();
}

function render() {
  const grid  = document.getElementById('grid');
  const codes = filter(allCodes());
  document.getElementById('countNum').textContent = codes.length;
  grid.innerHTML = '';

  if (!codes.length) {
    grid.innerHTML = '<div class="empty"><h2>No codes found</h2><p>Try a different search or filter.</p></div>';
    return;
  }

  codes.forEach(c => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-top">
        <span class="jurisdiction ${c.level}">${levelLabel(c.level)}: ${c.state}</span>
        <span class="stars" title="Usefulness: ${c.usefulness}/5">${stars(c.usefulness)}</span>
      </div>
      <div class="card-body">
        <div class="code-ref">${c.reference}</div>
        <div class="card-title">${c.title}</div>
        <span class="cat-tag ${catClass(c.category)}">${catLabel(c.category)}</span>
        <div class="description">${c.description}</div>
        ${c.conditions ? `<div class="conditions"><strong>Key conditions</strong>${c.conditions}</div>` : ''}
      </div>
      <div class="card-foot">
        ${(c.tags||[]).map(t => `<span class="tag-pill" onclick="addTagSearch('${t.replace(/'/g,"\\'")}')">${t}</span>`).join('')}
        ${c.url ? `<a class="source-link" href="${c.url}" target="_blank" rel="noopener">View Source ↗</a>` : ''}
      </div>`;
    grid.appendChild(div);
  });
}

// ── Add Code ──────────────────────────────────────────────────────────────────
function addCodePrompt() {
  const title = prompt('Code title:'); if (!title) return;
  const ref   = prompt('Code reference (e.g., "CA Gov Code § 12345"):'); if (!ref) return;
  const state = prompt('State (e.g., "California"):') || 'Unknown';
  const desc  = prompt('Description (plain English):'); if (!desc) return;
  const url   = prompt('Source URL (or leave blank):') || '';
  const tags  = (prompt('Tags (comma-separated):') || '').split(',').map(t=>t.trim()).filter(Boolean);
  const useful = parseInt(prompt('Usefulness 1–5:'), 10) || 3;

  const code = {
    id: 'user-' + Date.now(),
    state, level: 'state',
    reference: ref,
    category: 'owner-builder',
    title, description: desc,
    conditions: '',
    usefulness: Math.min(5, Math.max(1, useful)),
    url, tags
  };
  userCodes.push(code);
  localStorage.setItem('municipalUserCodes', JSON.stringify(userCodes));
  render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(allCodes(), null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'municipal-codes.json';
  a.click();
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildFilters();
render();
</script>
