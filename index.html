<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Municipal Code Finder — Property Owner's Edge</title>
<!-- v0.1.0 -->
<style>
:root {
  --cream: #f5f0e6;
  --cream-dark: #ede6d8;
  --paper: #faf8f3;
  --chocolate: #4a2c2a;
  --choc-mid: #6b4423;
  --burnt-orange: #e07b3c;
  --rust: #c2410c;
  --teal: #0d9488;
  --gold: #d97706;
  --line: #d4c4a8;
  --muted: #7a6b5d;
  --ink: #3a312b;
  --green: #2d6a4f;
  --blue: #1e4d7b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--cream);
  color: var(--ink);
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Overlay & Modal ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(30,15,10,.65);
  z-index: 100;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem 4rem;
  overflow-y: auto;
}
.overlay.hidden { display: none; }
.modal {
  background: var(--paper);
  border: 2px solid var(--chocolate);
  box-shadow: 8px 8px 0 var(--chocolate);
  width: 100%;
  max-width: 660px;
  position: relative;
  margin: auto;
}
.modal-close {
  position: absolute;
  top: .6rem; right: .7rem;
  background: none;
  border: none;
  font-size: 1.1rem;
  cursor: pointer;
  color: var(--muted);
  padding: .2rem .4rem;
  line-height: 1;
  z-index: 1;
}
.modal-close:hover { color: var(--rust); }

/* ── Detail View ── */
.detail-view { padding: 1.5rem; }
.detail-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: .75rem;
  margin-bottom: .6rem;
  flex-wrap: wrap;
}
.detail-actions { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
.detail-title { font-size: 1.2rem; font-weight: 800; color: var(--chocolate); margin: .25rem 0 .5rem; line-height: 1.25; }
.detail-desc { font-size: .93rem; margin-bottom: .75rem; }
.detail-conditions { margin-bottom: .75rem; border-left: 3px solid var(--line); padding-left: .65rem; }
.detail-conditions strong { color: var(--rust); font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: .15rem; }
.detail-conditions p { font-size: .87rem; color: var(--muted); }
.detail-tags { display: flex; flex-wrap: wrap; gap: .4rem; margin: .65rem 0; }
.detail-source {
  display: inline-block;
  margin: .4rem 0 .9rem;
  font-weight: 700;
  color: var(--burnt-orange);
  text-decoration: none;
  border-bottom: 2px solid var(--burnt-orange);
  font-size: .93rem;
}
.notes-section { margin-top: .9rem; border-top: 1.5px solid var(--line); padding-top: .9rem; }
.notes-section > label { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); display: block; margin-bottom: .35rem; }
.notes-section textarea {
  width: 100%; min-height: 80px;
  border: 1.5px solid var(--line);
  background: var(--cream);
  color: var(--ink);
  font-family: inherit; font-size: .9rem;
  padding: .45rem .6rem;
  resize: vertical; outline: none;
}
.notes-section textarea:focus { border-color: var(--burnt-orange); }
.disclaimer-box {
  margin-top: .9rem;
  padding: .45rem .7rem;
  background: var(--cream-dark);
  border-left: 3px solid var(--gold);
  font-size: .77rem;
  color: var(--muted);
}

/* ── Fav buttons ── */
.fav-star {
  background: none; border: none;
  font-size: 1.05rem; cursor: pointer;
  padding: .1rem .25rem; line-height: 1;
  color: var(--line);
}
.fav-star.active { color: var(--gold); }
.fav-star:hover  { color: var(--gold); }
.btn-fav-filter {
  background: none;
  border: 2px solid var(--line);
  color: var(--muted);
  padding: .4rem .7rem;
  font-size: .85rem;
  cursor: pointer;
  white-space: nowrap;
}
.btn-fav-filter:hover, .btn-fav-filter.active {
  border-color: var(--gold); color: var(--gold); background: #fff9e6;
}
.detail-fav {
  background: none;
  border: 1.5px solid var(--line);
  color: var(--muted);
  padding: .3rem .7rem;
  font-size: .85rem;
  cursor: pointer;
}
.detail-fav.active { border-color: var(--gold); color: var(--gold); background: #fff9e6; }

/* ── Code Form ── */
.form-view { padding: 1.4rem; }
.form-view h2 { font-size: 1.1rem; font-weight: 800; color: var(--chocolate); margin-bottom: .9rem; }
.form-fields { display: flex; flex-direction: column; gap: .65rem; }
.form-fields > label, .form-row > label {
  display: flex; flex-direction: column; gap: .18rem;
  font-size: .83rem; font-weight: 600;
}
.form-fields input, .form-fields textarea, .form-fields select {
  border: 1.5px solid var(--line);
  background: var(--cream); color: var(--ink);
  font-family: inherit; font-size: .88rem;
  padding: .42rem .55rem; outline: none;
}
.form-fields input:focus, .form-fields textarea:focus, .form-fields select:focus { border-color: var(--burnt-orange); }
.form-fields textarea { resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .65rem; }
.usefulness-row { display: flex; align-items: center; gap: .65rem; }
.usefulness-row input[type=range] { flex: 1; accent-color: var(--burnt-orange); }
.usefulness-val { font-weight: 700; color: var(--burnt-orange); min-width: 1.2rem; text-align: center; }
.form-actions { display: flex; gap: .55rem; margin-top: 1.1rem; flex-wrap: wrap; align-items: center; }

/* ── Shared buttons ── */
.btn-primary {
  background: var(--burnt-orange); color: #fff;
  border: 2px solid var(--chocolate);
  box-shadow: 3px 3px 0 var(--chocolate);
  padding: .48rem 1.1rem; font-weight: 700; font-size: .88rem; cursor: pointer;
}
.btn-primary:hover { box-shadow: 5px 5px 0 var(--burnt-orange); transform: translate(-1px,-1px); }
.btn-secondary {
  background: var(--cream); color: var(--chocolate);
  border: 2px solid var(--chocolate);
  box-shadow: 3px 3px 0 var(--chocolate);
  padding: .48rem 1.1rem; font-weight: 700; font-size: .88rem; cursor: pointer;
}
.btn-secondary:hover { background: var(--cream-dark); }
.btn-danger {
  background: #fff5f5; color: var(--rust);
  border: 2px solid var(--rust);
  padding: .48rem .95rem; font-weight: 700; font-size: .88rem; cursor: pointer;
  margin-left: auto;
}
.btn-danger:hover { background: var(--rust); color: #fff; }
.btn-sm-secondary {
  background: var(--cream); color: var(--chocolate);
  border: 1.5px solid var(--chocolate);
  padding: .28rem .65rem; font-weight: 700; font-size: .8rem; cursor: pointer;
}

/* ── Header ── */
header {
  background: var(--chocolate); color: var(--cream);
  padding: 1.2rem 2rem;
  border-bottom: 3px solid var(--burnt-orange);
}
header h1 { font-size: 1.35rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: .1rem; }
header p  { font-size: .84rem; opacity: .7; }
header .disc { font-style: italic; opacity: .5; }

/* ── Controls ── */
.controls {
  background: var(--cream-dark);
  border-bottom: 2px solid var(--line);
  padding: .8rem 1.5rem;
  display: flex; gap: .55rem; flex-wrap: wrap; align-items: center;
  position: sticky; top: 0; z-index: 10;
}
.search-wrap { flex: 1 1 170px; position: relative; }
.search-wrap input {
  width: 100%;
  padding: .42rem .6rem .42rem 1.75rem;
  border: 2px solid var(--line);
  background: var(--paper); color: var(--ink);
  font-size: .87rem; outline: none;
}
.search-wrap input:focus { border-color: var(--burnt-orange); }
.search-icon { position: absolute; left: .5rem; top: 50%; transform: translateY(-50%); opacity: .4; pointer-events: none; font-size: .9rem; }
.controls select {
  padding: .42rem .55rem;
  border: 2px solid var(--line);
  background: var(--paper); color: var(--ink);
  font-size: .87rem; cursor: pointer; outline: none;
}
.controls select:focus { border-color: var(--burnt-orange); }
.count-label { font-size: .8rem; color: var(--muted); white-space: nowrap; margin-left: auto; }
.count-label strong { color: var(--burnt-orange); }

/* ── Grid ── */
.grid {
  max-width: 1120px; margin: 0 auto;
  padding: 1.2rem 1.2rem 5.5rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.05rem;
}

/* ── Cards ── */
.card {
  background: var(--paper);
  border: 2px solid var(--chocolate);
  box-shadow: 4px 4px 0 var(--chocolate);
  display: flex; flex-direction: column;
  cursor: pointer;
  transition: box-shadow .1s, transform .1s;
}
.card:hover { box-shadow: 6px 6px 0 var(--burnt-orange); transform: translate(-1px,-1px); }
.card-top {
  padding: .65rem .85rem;
  border-bottom: 1.5px solid var(--line);
  display: flex; justify-content: space-between; align-items: center; gap: .4rem;
}
.card-top-left  { display: flex; align-items: center; gap: .35rem; flex-wrap: wrap; }
.card-top-right { display: flex; align-items: center; gap: .25rem; }
.jurisdiction {
  font-size: .67rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em;
  padding: .1rem .38rem; border: 1.5px solid currentColor;
}
.jurisdiction.state   { color: var(--blue); }
.jurisdiction.county  { color: var(--green); }
.jurisdiction.city    { color: var(--choc-mid); }
.jurisdiction.federal { color: var(--rust); }
.custom-badge {
  font-size: .63rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .04em;
  padding: .08rem .32rem;
  background: var(--choc-mid); color: var(--cream);
}
.stars { color: var(--gold); font-size: .88rem; white-space: nowrap; }
.note-dot { font-size: .78rem; }

.card-body { padding: .75rem .85rem; flex: 1; }
.code-ref  { font-size: .73rem; font-family: monospace; color: var(--muted); margin-bottom: .18rem; }
.card-title { font-weight: 700; font-size: .95rem; color: var(--chocolate); margin-bottom: .28rem; line-height: 1.3; }
.cat-tag {
  display: inline-block;
  font-size: .67rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em;
  padding: .09rem .36rem; margin-bottom: .45rem; border-radius: 2px;
}
.cat-owner-builder   { background: #fef3c7; color: #92400e; }
.cat-adu             { background: #d1fae5; color: #065f46; }
.cat-permit-exempt   { background: #e0f2fe; color: #075985; }
.cat-ag-rights       { background: #f0fdf4; color: #166534; }
.cat-grandfathering  { background: #f5f3ff; color: #5b21b6; }
.cat-off-grid        { background: #fff7ed; color: #c2410c; }
.cat-variance        { background: #fdf2f8; color: #9d174d; }
.cat-tax-homestead   { background: #f0f9ff; color: #0c4a6e; }
.cat-right-to-farm   { background: #f7fee7; color: #3f6212; }
.cat-water-rights    { background: #ecfeff; color: #164e63; }
.cat-neighbor-rights { background: #fef9ee; color: #78350f; }

.description {
  font-size: .87rem; color: var(--ink); margin-bottom: .35rem;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.conditions {
  font-size: .79rem; color: var(--muted);
  border-left: 2px solid var(--line); padding-left: .48rem;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-foot {
  padding: .48rem .85rem;
  border-top: 1.5px solid var(--line);
  display: flex; gap: .38rem; flex-wrap: wrap; align-items: center;
}
.tag-pill {
  font-size: .67rem; padding: .08rem .36rem;
  background: var(--cream-dark); color: var(--muted);
  border: 1px solid var(--line); cursor: pointer;
}
.tag-pill:hover { background: var(--line); color: var(--ink); }

/* ── Empty ── */
.empty { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--muted); }
.empty h2 { font-size: 1.1rem; margin-bottom: .4rem; color: var(--chocolate); }

/* ── Footer banner ── */
.banner {
  background: var(--chocolate); color: var(--cream);
  padding: .55rem 1.5rem;
  position: fixed; bottom: 0; left: 0; right: 0;
  border-top: 2px solid var(--burnt-orange);
  display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  z-index: 20;
}
.banner-disc { font-size: .76rem; opacity: .55; font-style: italic; }
.banner-btns { display: flex; gap: .45rem; align-items: center; flex-wrap: wrap; }
.banner-btn {
  background: none;
  border: 1.5px solid rgba(245,240,230,.38);
  color: var(--cream);
  padding: .28rem .7rem;
  font-size: .8rem; font-weight: 600; cursor: pointer;
}
.banner-btn:hover { background: rgba(255,255,255,.1); border-color: var(--cream); }

/* Export dropdown */
.export-wrap { position: relative; }
.export-drop {
  display: none;
  position: absolute; bottom: calc(100% + 5px); right: 0;
  background: var(--paper);
  border: 2px solid var(--chocolate);
  box-shadow: 4px 4px 0 var(--chocolate);
  min-width: 155px; z-index: 30;
}
.export-drop.open { display: block; }
.export-drop button {
  display: block; width: 100%; text-align: left;
  background: none; border: none;
  border-bottom: 1px solid var(--line);
  padding: .45rem .8rem;
  font-size: .84rem; color: var(--ink); cursor: pointer;
}
.export-drop button:last-child { border-bottom: none; }
.export-drop button:hover { background: var(--cream-dark); }

/* ── Print ── */
@media print {
  .controls, .banner, .overlay { display: none !important; }
  .grid { padding: 0; display: block; }
  .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; margin-bottom: .7rem; cursor: default; }
  .card:hover { transform: none; box-shadow: none; }
  .description, .conditions { display: block; -webkit-line-clamp: unset; overflow: visible; }
  body { background: #fff; }
  header { border-bottom: 2px solid #000; }
}
</style>
</head>
<body>

<!-- ── Modal overlay ── -->
<div id="overlay" class="overlay hidden" onclick="closeModal()">
  <div id="modal" class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()" title="Close (Esc)">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ── Header ── -->
<header>
  <h1>Municipal Code Finder</h1>
  <p>Legal provisions that give property owners more rights, fewer restrictions, and control over their land. <span class="disc">Informational only — not legal advice.</span></p>
</header>

<!-- ── Controls ── -->
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search codes, descriptions, tags…" oninput="onFilterChange()">
  </div>
  <select id="stateFilter" onchange="onFilterChange()">
    <option value="">All States</option>
  </select>
  <select id="levelFilter" onchange="onFilterChange()">
    <option value="">All Levels</option>
    <option value="state">State Law</option>
    <option value="county">County</option>
    <option value="city">City</option>
    <option value="federal">Federal</option>
  </select>
  <select id="catFilter" onchange="onFilterChange()">
    <option value="">All Categories</option>
  </select>
  <select id="sortBy" onchange="onFilterChange()">
    <option value="usefulness">Most Useful</option>
    <option value="alpha">A–Z</option>
    <option value="state">By State</option>
  </select>
  <button id="favBtn" class="btn-fav-filter" onclick="toggleFavFilter()">☆ Favorites</button>
  <div class="count-label"><strong id="countNum">0</strong> codes</div>
</div>

<!-- ── Grid ── -->
<div class="grid" id="grid"></div>

<!-- ── Footer ── -->
<div class="banner">
  <span class="banner-disc">Not legal advice — verify all codes with official sources and a licensed attorney.</span>
  <span class="banner-btns">
    <button class="banner-btn" onclick="openCodeForm('add')">+ Add Code</button>
    <div class="export-wrap">
      <button class="banner-btn" id="exportToggle" onclick="toggleExportDrop()">Export ▾</button>
      <div class="export-drop" id="exportDrop">
        <button onclick="exportData('all')">All Codes</button>
        <button onclick="exportData('custom')">Custom Only</button>
        <button onclick="exportData('favorites')">Favorites Only</button>
      </div>
    </div>
    <button class="banner-btn" onclick="triggerImport()">Import JSON</button>
    <button class="banner-btn" onclick="window.print()">🖨 Print / PDF</button>
  </span>
</div>

<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
// ── HTML escape ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Dataset ───────────────────────────────────────────────────────────────────
const BUILTIN = [

// ── Persistent state ───────────────────────────────────────────────────────────
let userCodes   = JSON.parse(localStorage.getItem('municipalUserCodes') || '[]');
let favorites   = new Set(JSON.parse(localStorage.getItem('mcf:favorites') || '[]'));
let notes       = JSON.parse(localStorage.getItem('mcf:notes') || '{}');
let showFavOnly = false;
let editingId   = null;
let currentDetailId = null;
let exportDropOpen  = false;

function allCodes()    { return [...BUILTIN, ...userCodes]; }
function findCode(id)  { return allCodes().find(c => c.id === id); }
function isCustom(id)  { return userCodes.some(c => c.id === id); }

function saveFavorites() { localStorage.setItem('mcf:favorites', JSON.stringify([...favorites])); }
function saveNotes()     { localStorage.setItem('mcf:notes', JSON.stringify(notes)); }
function saveUserCodes() { localStorage.setItem('municipalUserCodes', JSON.stringify(userCodes)); }

function catLabel(cat)  { return CAT_LABELS[cat] || cat; }
function levelLabel(lv) { return {state:'State',county:'County',city:'City',federal:'Federal'}[lv] || lv; }
function starsHtml(n)   { return '★'.repeat(n) + '☆'.repeat(5-n); }
function catCls(cat)    { return 'cat-' + (cat || 'owner-builder'); }

// ── Favorites ─────────────────────────────────────────────────────────────────
function toggleFavorite(id) {
  if (favorites.has(id)) favorites.delete(id); else favorites.add(id);
  saveFavorites();
  // update fav stars on cards (without full re-render)
  document.querySelectorAll('.fav-star').forEach(btn => {
    if (btn.dataset.id !== id) return;
    const on = favorites.has(id);
    btn.classList.toggle('active', on);
    btn.textContent = on ? '★' : '☆';
    btn.title = on ? 'Remove favorite' : 'Add to favorites';
  });
  // update detail-view fav button if open
  const dfav = document.getElementById('d-fav');
  if (dfav && currentDetailId === id) {
    const on = favorites.has(id);
    dfav.classList.toggle('active', on);
    dfav.textContent = on ? '★ Favorited' : '☆ Favorite';
  }
  // update note-dot on cards
  document.querySelectorAll('.note-dot').forEach(el => {
    if (el.dataset.id === id) el.textContent = notes[id] ? '📝' : '';
  });
}

function toggleFavFilter() {
  showFavOnly = !showFavOnly;
  const btn = document.getElementById('favBtn');
  btn.classList.toggle('active', showFavOnly);
  btn.textContent = showFavOnly ? '★ Favorites' : '☆ Favorites';
  onFilterChange();
}

// ── Notes ─────────────────────────────────────────────────────────────────────
function saveNote(id, text) {
  if (text.trim()) notes[id] = text.trim();
  else delete notes[id];
  saveNotes();
  document.querySelectorAll('.note-dot').forEach(el => {
    if (el.dataset.id === id) el.textContent = notes[id] ? '📝' : '';
  });
}

// ── Filtering ─────────────────────────────────────────────────────────────────
function filter(codes) {
  const q   = document.getElementById('search').value.toLowerCase().trim();
  const st  = document.getElementById('stateFilter').value;
  const lv  = document.getElementById('levelFilter').value;
  const cat = document.getElementById('catFilter').value;
  const srt = document.getElementById('sortBy').value;

  let out = codes.filter(c => {
    if (showFavOnly && !favorites.has(c.id)) return false;
    if (st  && c.state !== st)    return false;
    if (lv  && c.level !== lv)    return false;
    if (cat && c.category !== cat) return false;
    if (q) {
      const blob = [c.title, c.description, c.reference, c.state, c.conditions, ...(c.tags||[])].join(' ').toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });

  if (srt === 'usefulness') out.sort((a,b) => b.usefulness - a.usefulness);
  else if (srt === 'alpha') out.sort((a,b) => a.title.localeCompare(b.title));
  else if (srt === 'state') out.sort((a,b) => a.state.localeCompare(b.state) || b.usefulness - a.usefulness);
  return out;
}

// ── URL state ─────────────────────────────────────────────────────────────────
function writeUrlState() {
  const p = new URLSearchParams();
  const q = document.getElementById('search').value;
  const s = document.getElementById('stateFilter').value;
  const l = document.getElementById('levelFilter').value;
  const c = document.getElementById('catFilter').value;
  const o = document.getElementById('sortBy').value;
  if (q) p.set('q', q);
  if (s) p.set('state', s);
  if (l) p.set('level', l);
  if (c) p.set('cat', c);
  if (o && o !== 'usefulness') p.set('sort', o);
  if (showFavOnly) p.set('fav', '1');
  const h = p.toString();
  history.replaceState(null, '', h ? '#' + h : location.pathname + location.search);
}

function applyUrlState() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  const p = new URLSearchParams(hash);
  if (p.get('q'))     document.getElementById('search').value = p.get('q');
  if (p.get('state')) document.getElementById('stateFilter').value = p.get('state');
  if (p.get('level')) document.getElementById('levelFilter').value = p.get('level');
  if (p.get('cat'))   document.getElementById('catFilter').value = p.get('cat');
  if (p.get('sort'))  document.getElementById('sortBy').value = p.get('sort');
  if (p.get('fav') === '1') {
    showFavOnly = true;
    const btn = document.getElementById('favBtn');
    btn.classList.add('active');
    btn.textContent = '★ Favorites';
  }
}

function onFilterChange() { render(); writeUrlState(); }

function addTagSearch(tag) {
  document.getElementById('search').value = tag;
  onFilterChange();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const grid  = document.getElementById('grid');
  const codes = filter(allCodes());
  document.getElementById('countNum').textContent = codes.length;
  grid.innerHTML = '';

  if (!codes.length) {
    grid.innerHTML = '<div class="empty"><h2>No codes found</h2><p>Try a different search term or filter.</p></div>';
    return;
  }

  codes.forEach(c => {
    const isFav   = favorites.has(c.id);
    const hasNote = !!notes[c.id];
    const custom  = isCustom(c.id);
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.id = c.id;
    div.innerHTML =
      `<div class="card-top">` +
        `<div class="card-top-left">` +
          `<span class="jurisdiction ${esc(c.level)}">${esc(levelLabel(c.level))}: ${esc(c.state)}</span>` +
          (custom ? `<span class="custom-badge">Custom</span>` : '') +
        `</div>` +
        `<div class="card-top-right">` +
          `<span class="note-dot" data-id="${esc(c.id)}" title="Has notes">${hasNote ? '📝' : ''}</span>` +
          `<span class="stars" title="Usefulness: ${c.usefulness}/5">${starsHtml(c.usefulness)}</span>` +
          `<button class="fav-star ${isFav ? 'active' : ''}" data-id="${esc(c.id)}" title="${isFav ? 'Remove favorite' : 'Add to favorites'}">${isFav ? '★' : '☆'}</button>` +
        `</div>` +
      `</div>` +
      `<div class="card-body">` +
        `<div class="code-ref">${esc(c.reference)}</div>` +
        `<div class="card-title">${esc(c.title)}</div>` +
        `<span class="cat-tag ${catCls(c.category)}">${esc(catLabel(c.category))}</span>` +
        `<div class="description">${esc(c.description)}</div>` +
        (c.conditions ? `<div class="conditions">${esc(c.conditions)}</div>` : '') +
      `</div>` +
      `<div class="card-foot">` +
        (c.tags||[]).map(t => `<span class="tag-pill" data-tag="${esc(t)}">${esc(t)}</span>`).join('') +
      `</div>`;
    grid.appendChild(div);
  });
}

// ── Grid event delegation ─────────────────────────────────────────────────────
document.getElementById('grid').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const id = card.dataset.id;

  if (e.target.closest('.fav-star')) { e.stopPropagation(); toggleFavorite(id); return; }
  if (e.target.classList.contains('tag-pill')) { e.stopPropagation(); addTagSearch(e.target.dataset.tag); return; }
  openDetail(id);
});

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('overlay').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
  document.body.style.overflow = '';
  editingId = null;
  currentDetailId = null;
}

// ── Detail view ───────────────────────────────────────────────────────────────
function openDetail(id) {
  const c = findCode(id);
  if (!c) return;
  currentDetailId = id;
  const isFav  = favorites.has(id);
  const custom = isCustom(id);

  document.getElementById('modal-body').innerHTML =
    `<div class="detail-view">` +
      `<div class="detail-top">` +
        `<span class="jurisdiction ${esc(c.level)}">${esc(levelLabel(c.level))}: ${esc(c.state)}</span>` +
        `<div class="detail-actions">` +
          `<button class="detail-fav ${isFav ? 'active' : ''}" id="d-fav">${isFav ? '★ Favorited' : '☆ Favorite'}</button>` +
          (custom ? `<button class="btn-sm-secondary" id="d-edit">Edit</button>` : '') +
        `</div>` +
      `</div>` +
      `<div class="code-ref">${esc(c.reference)}</div>` +
      `<h2 class="detail-title">${esc(c.title)}</h2>` +
      `<span class="cat-tag ${catCls(c.category)}">${esc(catLabel(c.category))}</span>` +
      `<p class="detail-desc">${esc(c.description)}</p>` +
      (c.conditions ?
        `<div class="detail-conditions"><strong>Key Conditions</strong><p>${esc(c.conditions)}</p></div>` : '') +
      (c.tags?.length ?
        `<div class="detail-tags">${c.tags.map(t=>`<span class="tag-pill" data-tag="${esc(t)}">${esc(t)}</span>`).join('')}</div>` : '') +
      (c.url ?
        `<a class="detail-source" href="${esc(c.url)}" target="_blank" rel="noopener">View Official Source ↗</a>` : '') +
      `<div class="notes-section">` +
        `<label for="d-note">Private Notes</label>` +
        `<textarea id="d-note" placeholder="Your private notes about this code…">${esc(notes[id] || '')}</textarea>` +
      `</div>` +
      `<div class="disclaimer-box">⚠ Informational only — not legal advice. Verify with official sources and a licensed attorney before relying on any provision.</div>` +
    `</div>`;

  // Wire interactive elements
  document.getElementById('d-fav').addEventListener('click', () => toggleFavorite(id));
  if (custom) document.getElementById('d-edit')?.addEventListener('click', () => { closeModal(); openCodeForm('edit', id); });
  const noteTA = document.getElementById('d-note');
  noteTA.addEventListener('blur', () => saveNote(id, noteTA.value));

  // Detail tags → tag search
  document.getElementById('modal-body').querySelectorAll('.tag-pill').forEach(pill => {
    pill.addEventListener('click', () => { addTagSearch(pill.dataset.tag); closeModal(); });
  });

  openModal();
}

// ── Code form ─────────────────────────────────────────────────────────────────
function openCodeForm(mode, id = null) {
  editingId = id;
  const c = id ? findCode(id) : null;

  const catOptions = Object.entries(CAT_LABELS)
    .map(([v,l]) => `<option value="${v}"${c?.category===v?' selected':''}>${l}</option>`).join('');
  const lvlOptions = ['state','county','city','federal']
    .map(v => `<option value="${v}"${(c?.level||'state')===v?' selected':''}>${levelLabel(v)}</option>`).join('');
  const stateDatalist = [...new Set(allCodes().map(x=>x.state))].sort()
    .map(s=>`<option value="${esc(s)}">`).join('');

  document.getElementById('modal-body').innerHTML =
    `<div class="form-view">` +
      `<h2>${mode==='edit' ? 'Edit Code' : 'Add New Code'}</h2>` +
      `<div class="form-fields">` +
        `<label>Title *<input type="text" id="f-title" value="${esc(c?.title||'')}" placeholder="Short descriptive title"></label>` +
        `<label>Code Reference *<input type="text" id="f-ref" value="${esc(c?.reference||'')}" placeholder="e.g., CA Gov Code § 65852.2"></label>` +
        `<div class="form-row">` +
          `<label>State *<input type="text" id="f-state" list="f-states" value="${esc(c?.state||'')}"><datalist id="f-states">${stateDatalist}</datalist></label>` +
          `<label>Level<select id="f-level">${lvlOptions}</select></label>` +
        `</div>` +
        `<label>Category<select id="f-cat">${catOptions}</select></label>` +
        `<label>Description *<textarea id="f-desc" rows="4" placeholder="Plain-English description of what this provision allows">${esc(c?.description||'')}</textarea></label>` +
        `<label>Key Conditions<textarea id="f-cond" rows="3" placeholder="Requirements, exceptions, limitations">${esc(c?.conditions||'')}</textarea></label>` +
        `<label>Source URL<input type="url" id="f-url" value="${esc(c?.url||'')}" placeholder="https://…"></label>` +
        `<label>Tags (comma-separated)<input type="text" id="f-tags" value="${esc((c?.tags||[]).join(', '))}" placeholder="rural, no-permit, ADU"></label>` +
        `<label>Usefulness (1–5)` +
          `<div class="usefulness-row">` +
            `<input type="range" id="f-use" min="1" max="5" value="${c?.usefulness||3}" oninput="document.getElementById('f-use-val').textContent=this.value">` +
            `<span class="usefulness-val" id="f-use-val">${c?.usefulness||3}</span>` +
          `</div>` +
        `</label>` +
      `</div>` +
      `<div class="form-actions">` +
        `<button class="btn-primary" id="f-save">Save</button>` +
        `<button class="btn-secondary" id="f-cancel">Cancel</button>` +
        (mode==='edit' ? `<button class="btn-danger" id="f-delete">Delete</button>` : '') +
      `</div>` +
    `</div>`;

  document.getElementById('f-save').addEventListener('click', saveCode);
  document.getElementById('f-cancel').addEventListener('click', closeModal);
  if (mode==='edit') document.getElementById('f-delete')?.addEventListener('click', () => deleteCode(id));
  openModal();
}

function saveCode() {
  const title = document.getElementById('f-title').value.trim();
  const ref   = document.getElementById('f-ref').value.trim();
  const state = document.getElementById('f-state').value.trim();
  const desc  = document.getElementById('f-desc').value.trim();
  if (!title || !ref || !state || !desc) { alert('Title, Reference, State, and Description are required.'); return; }

  const code = {
    id:          editingId || ('user-' + Date.now()),
    state, level: document.getElementById('f-level').value,
    reference:   ref,
    category:    document.getElementById('f-cat').value,
    title, description: desc,
    conditions:  document.getElementById('f-cond').value.trim(),
    usefulness:  parseInt(document.getElementById('f-use').value, 10),
    url:         document.getElementById('f-url').value.trim(),
    tags:        document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
  };

  if (editingId) {
    const idx = userCodes.findIndex(c => c.id === editingId);
    if (idx !== -1) userCodes[idx] = code;
  } else {
    userCodes.push(code);
  }
  saveUserCodes();
  closeModal();
  render();
}

function deleteCode(id) {
  if (!confirm('Delete this code? This cannot be undone.')) return;
  userCodes = userCodes.filter(c => c.id !== id);
  favorites.delete(id);
  delete notes[id];
  saveUserCodes(); saveFavorites(); saveNotes();
  closeModal();
  render();
}

// ── Export / Import ───────────────────────────────────────────────────────────
function toggleExportDrop() {
  exportDropOpen = !exportDropOpen;
  document.getElementById('exportDrop').classList.toggle('open', exportDropOpen);
}
document.addEventListener('click', e => {
  if (exportDropOpen && !e.target.closest('.export-wrap')) {
    exportDropOpen = false;
    document.getElementById('exportDrop').classList.remove('open');
  }
});

function exportData(scope = 'all') {
  exportDropOpen = false;
  document.getElementById('exportDrop').classList.remove('open');
  let codes = allCodes();
  if (scope === 'custom')    codes = userCodes;
  if (scope === 'favorites') codes = codes.filter(c => favorites.has(c.id));
  const blob = new Blob([JSON.stringify(codes, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `municipal-codes-${scope}-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function triggerImport() { document.getElementById('importFile').click(); }

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      let inc = JSON.parse(ev.target.result);
      if (!Array.isArray(inc)) inc = [inc];
      const existIds = new Set(allCodes().map(c => c.id));
      let added = 0;
      inc.forEach(c => {
        if (!c.id || !c.title) return;
        // give built-in IDs a new user prefix to avoid collision
        const newId = BUILTIN.some(b=>b.id===c.id) ? ('user-'+Date.now()+'-'+Math.random().toString(36).slice(2)) : c.id;
        if (existIds.has(newId)) return;
        userCodes.push({...c, id:newId});
        existIds.add(newId);
        added++;
      });
      saveUserCodes();
      render();
      alert(`Imported ${added} new code(s). ${inc.length - added} duplicate(s) skipped.`);
    } catch { alert('Could not parse file. Make sure it is JSON exported from this tool.'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// ── Filter dropdowns init ─────────────────────────────────────────────────────
function buildFilters() {
  const states = [...new Set(allCodes().map(c=>c.state))].sort();
  const cats   = [...new Set(allCodes().map(c=>c.category))].sort();
  const sf = document.getElementById('stateFilter');
  const cf = document.getElementById('catFilter');
  states.forEach(s => { const o=document.createElement('option'); o.value=s; o.text=s; sf.appendChild(o); });
  cats.forEach(cat => { const o=document.createElement('option'); o.value=cat; o.text=catLabel(cat); cf.appendChild(o); });
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); return; }
  if (!document.getElementById('overlay').classList.contains('hidden')) return;
  if (e.key === '/' && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
buildFilters();
applyUrlState();
render();
</script>
